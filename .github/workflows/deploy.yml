name: Deploy to Self-Hosted Runner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    if: >
      contains(github.event.head_commit.message, 'trigger deploy') &&
      github.event.head_commit.author.username == 'timothyoesch'
    # check that the commit message contains 'DEPLOY' and that no files were added, removed, or modified
    runs-on: self-hosted

    steps:
      - name: Pull, Build, and Restart
        run: |
          cd /data/sites/timothyoesch/blog
          git pull
          npm ci
          npm run build
          pm2 restart ecosystem.prod.config.cjs
